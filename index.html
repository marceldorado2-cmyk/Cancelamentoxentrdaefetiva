<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borderô de Vendas | Collina Dreams</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #0d1229;
            --bg-card: #111836;
            --accent: #1a73e8;
            --accent-light: #64b5f6;
            --accent-glow: #448aff;
            --text: #e8eaed;
            --text-secondary: #9aa0b4;
            --border: #1e2a4a;
            --danger: #ff5252;
            --success: #4caf84;
            --warning: #ffb74d;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(26, 115, 232, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(100, 181, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(68, 138, 255, 0.05) 0%, transparent 70%);
            line-height: 1.5;
        }
        .dashboard {
            max-width: 1520px;
            margin: 0 auto;
            padding: 16px 20px 40px;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            padding: 18px 24px;
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 1px rgba(26, 115, 232, 0.3);
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
            border-radius: 2px;
        }
        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-light), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header h1 .icon {
            font-size: 1.8rem;
        }
        .date-range {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .date-range label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .date-range input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            width: 135px;
            cursor: pointer;
            transition: all 0.25s;
            outline: none;
        }
        .date-range input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(26, 115, 232, 0.25);
        }
        .btn-filter {
            background: linear-gradient(135deg, var(--accent), #1565c0);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.3);
        }
        .btn-filter:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.45);
        }
        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.25s;
        }
        .btn-reset:hover {
            border-color: var(--accent-light);
            color: var(--text);
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .kpi-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 18px 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            cursor: default;
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35), 0 0 1px rgba(100, 181, 246, 0.2);
        }
        .kpi-card .kpi-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .kpi-card .kpi-value {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .kpi-card .kpi-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .kpi-accent {
            color: var(--accent-light);
        }
        .kpi-success {
            color: var(--success);
        }
        .kpi-danger {
            color: var(--danger);
        }
        .kpi-warning {
            color: var(--warning);
        }
        .kpi-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 60px;
            border-radius: 0 16px 0 100%;
            background: linear-gradient(135deg, transparent 40%, rgba(26, 115, 232, 0.06) 100%);
            pointer-events: none;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(460px, 1fr));
            gap: 18px;
            margin-bottom: 18px;
        }
        .chart-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 22px;
            border: 1px solid var(--border);
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        .chart-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            font-weight: 700;
        }
        .chart-wrap {
            position: relative;
            width: 100%;
        }
        .chart-wrap canvas {
            width: 100% !important;
        }
        .table-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px 22px;
            border: 1px solid var(--border);
            overflow-x: auto;
            margin-bottom: 18px;
        }
        .table-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            font-weight: 700;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.78rem;
            min-width: 800px;
        }
        table th {
            background: var(--bg-secondary);
            color: var(--accent-light);
            padding: 10px 12px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.7rem;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        table td {
            padding: 9px 12px;
            border-bottom: 1px solid rgba(30, 42, 74, 0.5);
            white-space: nowrap;
        }
        table tbody tr {
            transition: background 0.2s;
        }
        table tbody tr:hover {
            background: rgba(26, 115, 232, 0.06);
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-active {
            background: rgba(76, 175, 132, 0.15);
            color: var(--success);
        }
        .badge-cancelled {
            background: rgba(255, 82, 82, 0.15);
            color: var(--danger);
        }
        .cancel-faixa-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            min-width: 600px;
        }
        .cancel-faixa-table th {
            background: var(--bg-secondary);
            color: var(--accent-light);
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.72rem;
        }
        .cancel-faixa-table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(30, 42, 74, 0.5);
        }
        .cancel-faixa-table .bar-cell {
            position: relative;
        }
        .cancel-faixa-table .bar-fill {
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--danger), #ff8a80);
            transition: width 0.5s;
        }
        .cancel-faixa-table .bar-fill-bg {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.05);
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .date-range input {
                width: 110px;
            }
        }
        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr 1fr;
            }
            .kpi-card .kpi-value {
                font-size: 1.2rem;
            }
        }
        ::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1><span class="icon">🏔️</span>Borderô de Vendas <span style="font-weight:400;font-size:0.85rem;">Collina Dreams</span></h1>
            <div class="date-range">
                <label>📅 Período</label>
                <input type="text" id="dateStart" placeholder="Data inicial" readonly>
                <span style="color:var(--text-secondary)">até</span>
                <input type="text" id="dateEnd" placeholder="Data final" readonly>
                <button class="btn-filter" onclick="applyFilter()">🔍 Filtrar</button>
                <button class="btn-reset" onclick="resetFilter()">↺ Limpar</button>
            </div>
        </header>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 VGV & Entrada Efetiva por Dia</h3>
                <div class="chart-wrap"><canvas id="chartVGV"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>📊 Cancelamentos por Faixa de % Entrada</h3>
                <div class="chart-wrap"><canvas id="chartCancelFaixa"></canvas></div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>🥧 Status das Vendas</h3>
                <div class="chart-wrap" style="max-height:320px"><canvas id="chartStatus"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>💳 Formas de Pagamento (Entrada)</h3>
                <div class="chart-wrap" style="max-height:320px"><canvas id="chartPagamento"></canvas></div>
            </div>
        </div>

        <div class="chart-card full-width" style="margin-bottom:18px">
            <h3>📋 Tabela de Cancelamentos por Faixa de % Entrada Efetiva</h3>
            <div id="faixaTable"></div>
        </div>

        <div class="chart-card full-width" style="margin-bottom:18px">
            <h3>🏆 Top 10 Closers por VGV</h3>
            <div class="chart-wrap"><canvas id="chartClosers"></canvas></div>
        </div>

        <div class="table-card">
            <h3>📝 Lista de Vendas Filtradas <span id="tableCount" style="font-weight:400;color:var(--text-secondary)"></span></h3>
            <div style="overflow-x:auto"><table id="dataTable"><thead></thead><tbody></tbody></table></div>
        </div>
    </div>

                const maxD = new Date(Math.max(...allDates));
                fpStart.setDate(minD);
                fpEnd.setDate(maxD);
            }
            filteredData = [...allData];
            renderAll();
        }

        function getFaixa(perc) {
            if (perc >= 0.1 && perc <= 0.5) return '0,1% a 0,5%';
            if (perc >= 0.6 && perc <= 1.0) return '0,6% a 1%';
            if (perc >= 1.1 && perc <= 1.5) return '1,1% a 1,5%';
            if (perc >= 1.6 && perc <= 2.0) return '1,6% a 2%';
            if (perc >= 2.1 && perc <= 5.0) return '2,1% a 5%';
            if (perc >= 5.1) return 'Acima de 5,1%';
            return '0% (sem entrada)';
        }

        const faixaOrder = ['0% (sem entrada)', '0,1% a 0,5%', '0,6% a 1%', '1,1% a 1,5%', '1,6% a 2%', '2,1% a 5%', 'Acima de 5,1%'];

        let charts = {};

        function destroyCharts() {
            Object.values(charts).forEach(c => { try { c.destroy(); } catch (e) {} });
            charts = {};
        }

        function fmtBRL(v) {
            return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }

        function fmtBRL2(v) {
            return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderAll() {
            destroyCharts();
            const d = filteredData;
            const totalVGV = d.reduce((s, r) => s + r.valorNegociado, 0);
            const totalEntradaEfetiva = d.reduce((s, r) => s + r.entradaEfetiva, 0);
            const qtdVendas = d.length;
            const ticketMedio = qtdVendas > 0 ? totalVGV / qtdVendas : 0;
            const percEntradaMedio = qtdVendas > 0 ? d.reduce((s, r) => s + r.percentualEntrada, 0) / qtdVendas : 0;
            const ativos = d.filter(r => r.status === 'ATIVO');
            const cancelados = d.filter(r => r.status === 'CANCELADO');
            const taxaCancel = qtdVendas > 0 ? (cancelados.length / qtdVendas * 100) : 0;
            const totalEntrada = d.reduce((s, r) => s + r.totalEntrada, 0);

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card"><div class="kpi-label">💰 VGV Total</div><div class="kpi-value kpi-accent">${fmtBRL(totalVGV)}</div><div class="kpi-sub">Valor total negociado</div></div>
                <div class="kpi-card"><div class="kpi-label">📥 Entrada Efetiva</div><div class="kpi-value kpi-accent">${fmtBRL(totalEntradaEfetiva)}</div><div class="kpi-sub">Total recebido no período</div></div>
                <div class="kpi-card"><div class="kpi-label">🛒 Qtd. de Vendas</div><div class="kpi-value" style="color:#fff">${qtdVendas}</div><div class="kpi-sub">${ativos.length} ativas | ${cancelados.length} canceladas</div></div>
                <div class="kpi-card"><div class="kpi-label">📊 Ticket Médio</div><div class="kpi-value kpi-warning">${fmtBRL(ticketMedio)}</div><div class="kpi-sub">VGV / Vendas</div></div>
                <div class="kpi-card"><div class="kpi-label">📋 % Entrada Médio</div><div class="kpi-value kpi-success">${percEntradaMedio.toFixed(1)}%</div><div class="kpi-sub">Média do percentual</div></div>
                <div class="kpi-card"><div class="kpi-label">🚫 Taxa de Cancelamento</div><div class="kpi-value kpi-danger">${taxaCancel.toFixed(1)}%</div><div class="kpi-sub">${cancelados.length} de ${qtdVendas} vendas</div></div>
            `;

            // Chart: VGV & Entrada Efetiva por Dia
            const dailyMap = {};
            d.forEach(r => {
                if (!r.data) return;
                if (!dailyMap[r.data]) dailyMap[r.data] = { vgv: 0, entrada: 0 };
                dailyMap[r.data].vgv += r.valorNegociado;
                dailyMap[r.data].entrada += r.entradaEfetiva;
            });
            const dailySorted = Object.entries(dailyMap).sort((a, b) => {
                const da = parseDate(a[0]);
                const db = parseDate(b[0]);
                return da - db;
            });

            const ctxVGV = document.getElementById('chartVGV').getContext('2d');
            charts.vgv = new Chart(ctxVGV, {
                type: 'line',
                data: {
                    labels: dailySorted.map(e => e[0]),
                    datasets: [
                        {
                            label: 'VGV (R$)',
                            data: dailySorted.map(e => e[1].vgv),
                            borderColor: '#448aff',
                            backgroundColor: 'rgba(68,138,255,0.08)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2.5,
                            pointRadius: 3,
                            pointBackgroundColor: '#448aff',
                            yAxisID: 'y'
                        },
                        {
                            label: 'Entrada Efetiva (R$)',
                            data: dailySorted.map(e => e[1].entrada),
                            borderColor: '#64b5f6',
                            backgroundColor: 'rgba(100,181,246,0.06)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 2.5,
                            pointRadius: 3,
                            pointBackgroundColor: '#64b5f6',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.2,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#9aa0b4', usePointStyle: true, padding: 20, font: { size: 11 } } },
                        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fmtBRL(ctx.parsed.y) } }
                    },
                    scales: {
                        x: { ticks: { color: '#9aa0b4', maxTicksLimit: 12, font: { size: 10 } }, grid: { color: 'rgba(30,42,74,0.4)' } },
                        y: {
                            type: 'linear', position: 'left',
                            ticks: { color: '#448aff', callback: v => 'R$ ' + (v / 1000).toFixed(0) + 'k', font: { size: 10 } },
                            grid: { color: 'rgba(30,42,74,0.4)' }
                        },
                        y1: {
                            type: 'linear', position: 'right',
                            ticks: { color: '#64b5f6', callback: v => 'R$ ' + (v / 1000).toFixed(0) + 'k', font: { size: 10 } },
                            grid: { drawOnChartArea: false }
                        }
                    }
                }
            });

            // Chart: Cancelamentos por Faixa de % Entrada
            const faixaMap = {};
            faixaOrder.forEach(f => { faixaMap[f] = { total: 0, cancelados: 0 }; });
            d.forEach(r => {
                const f = getFaixa(r.percentualEntrada);
                if (!faixaMap[f]) faixaMap[f] = { total: 0, cancelados: 0 };
                faixaMap[f].total++;
                if (r.status === 'CANCELADO') faixaMap[f].cancelados++;
            });
            const faixasComDados = faixaOrder.filter(f => faixaMap[f] && faixaMap[f].total > 0);
            const ctxCancelFaixa = document.getElementById('chartCancelFaixa').getContext('2d');
            charts.cancelFaixa = new Chart(ctxCancelFaixa, {
                type: 'bar',
                data: {
                    labels: faixasComDados,
                    datasets: [
                        {
                            label: 'Qtd. Cancelamentos',
                            data: faixasComDados.map(f => faixaMap[f].cancelados),
                            backgroundColor: 'rgba(255,82,82,0.7)',
                            borderColor: '#ff5252',
                            borderWidth: 1,
                            borderRadius: 6,
                            yAxisID: 'y'
                        },
                        {
                            label: '% Cancelamento',
                            data: faixasComDados.map(f => faixaMap[f].total > 0 ? (faixaMap[f].cancelados / faixaMap[f].total * 100) : 0),
                            type: 'line',
                            borderColor: '#ffb74d',
                            backgroundColor: 'rgba(255,183,77,0.1)',
                            borderWidth: 3,
                            pointRadius: 5,
                            pointBackgroundColor: '#ffb74d',
                            tension: 0.3,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.2,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { labels: { color: '#9aa0b4', usePointStyle: true, padding: 20, font: { size: 11 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    if (ctx.dataset.label.includes('%')) return 'Taxa de Cancelamento: ' + ctx.parsed.y.toFixed(1) + '%';
                                    return 'Cancelamentos: ' + ctx.parsed.y;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { color: '#9aa0b4', font: { size: 10 } }, grid: { display: false } },
                        y: {
                            type: 'linear', position: 'left', title: { display: true, text: 'Qtd. Cancelamentos', color: '#ff5252' },
                            ticks: { color: '#ff5252', font: { size: 10 }, stepSize: 1 },
                            grid: { color: 'rgba(30,42,74,0.4)' }
                        },
                        y1: {
                            type: 'linear', position: 'right', title: { display: true, text: '% Cancelamento', color: '#ffb74d' },
                            ticks: { color: '#ffb74d', callback: v => v.toFixed(0) + '%', font: { size: 10 } },
                            grid: { drawOnChartArea: false }, min: 0, max: 100
                        }
                    }
                }
            });

            // Chart: Status das Vendas (Pie)
            const ctxStatus = document.getElementById('chartStatus').getContext('2d');
            charts.status = new Chart(ctxStatus, {
                type: 'doughnut',
                data: {
                    labels: ['Ativas', 'Canceladas'],
                    datasets: [{
                        data: [ativos.length, cancelados.length],
                        backgroundColor: ['rgba(76,175,132,0.8)', 'rgba(255,82,82,0.8)'],
                        borderColor: ['#4caf84', '#ff5252'],
                        borderWidth: 2,
                        hoverBorderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 1.5,
                    plugins: {
                        legend: { labels: { color: '#9aa0b4', usePointStyle: true, padding: 16, font: { size: 12 } } },
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                                    const pct = total > 0 ? (ctx.parsed / total * 100).toFixed(1) : 0;
                                    return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                                }
                            }
                        }
                    }
                }
            });

            // Chart: Formas de Pagamento
            const totCartao = d.reduce((s, r) => s + r.valorCartao, 0);
            const totBoleto = d.reduce((s, r) => s + r.valorBoleto, 0);
            const totDinheiro = d.reduce((s, r) => s + r.valorDinheiro, 0);
            const totTransf = d.reduce((s, r) => s + r.valorTransferencia, 0);
            const pgtoLabels = [];
            const pgtoData = [];
            const pgtoColors = [];
            if (totCartao > 0) { pgtoLabels.push('Cartão'); pgtoData.push(totCartao);
                pgtoColors.push('rgba(68,138,255,0.8)'); }
            if (totBoleto > 0) { pgtoLabels.push('Boleto'); pgtoData.push(totBoleto);
                pgtoColors.push('rgba(100,181,246,0.8)'); }
            if (totDinheiro > 0) { pgtoLabels.push('Dinheiro'); pgtoData.push(totDinheiro);
                pgtoColors.push('rgba(33,150,243,0.8)'); }
            if (totTransf > 0) { pgtoLabels.push('Transferência'); pgtoData.push(totTransf);
                pgtoColors.push('rgba(30,136,229,0.8)'); }
            const ctxPgto = document.getElementById('chartPagamento').getContext('2d');
            charts.pgto = new Chart(ctxPgto, {
                type: 'polarArea',
                data: {
                    labels: pgtoLabels,
                    datasets: [{ data: pgtoData, backgroundColor: pgtoColors, borderColor: pgtoColors.map(c => c.replace(
                            '0.8', '1')), borderWidth: 2 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 1.5,
                    plugins: {
                        legend: { labels: { color: '#9aa0b4', usePointStyle: true, padding: 16, font: { size: 11 } } },
                        tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fmtBRL(ctx.parsed.r) } }
                    },
                    scales: {
                        r: { ticks: { color: '#9aa0b4', backdropColor: 'transparent', font: { size: 9 },
                                callback: v => (v / 1000).toFixed(0) + 'k' }, grid: { color: 'rgba(30,42,74,0.5)' } }
                    }
                }
            });

            // Chart: Top 10 Closers
            const closerMap = {};
            d.forEach(r => {
                const c = r.closer || 'Não informado';
                if (!closerMap[c]) closerMap[c] = { vgv: 0, qtd: 0 };
                closerMap[c].vgv += r.valorNegociado;
                closerMap[c].qtd++;
            });
            const topClosers = Object.entries(closerMap).sort((a, b) => b[1].vgv - a[1].vgv).slice(0, 10);
            const ctxClosers = document.getElementById('chartClosers').getContext('2d');
            charts.closers = new Chart(ctxClosers, {
                type: 'bar',
                data: {
                    labels: topClosers.map(c => c[0].length > 22 ? c[0].substring(0, 22) + '...' : c[0]),
                    datasets: [{
                        label: 'VGV (R$)',
                        data: topClosers.map(c => c[1].vgv),
                        backgroundColor: 'rgba(68,138,255,0.7)',
                        borderColor: '#448aff',
                        borderWidth: 1,
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 2.0,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => fmtBRL(ctx.parsed.x) + ' | ' + topClosers[ctx.dataIndex][1]
                                    .qtd + ' vendas' } }
                    },
                    scales: {
                        x: { ticks: { color: '#9aa0b4', callback: v => (v / 1000).toFixed(0) + 'k',
                                font: { size: 10 } }, grid: { color: 'rgba(30,42,74,0.4)' } },
                        y: { ticks: { color: '#e8eaed', font: { size: 10 } }, grid: { display: false } }
                    }
                }
            });

            // Tabela de Faixas
            let faixaHTML = `<table class="cancel-faixa-table"><thead><tr>
                <th>Faixa de % Entrada</th><th>Total Vendas</th><th>Cancelamentos</th><th>% Cancelamento</th><th>Visual</th>
            </tr></thead><tbody>`;
            faixaOrder.forEach(f => {
                const fm = faixaMap[f];
                if (!fm || fm.total === 0) return;
                const pct = fm.total > 0 ? (fm.cancelados / fm.total * 100) : 0;
                const barW = Math.min(pct, 100);
                faixaHTML += `<tr>
                    <td><strong>${f}</strong></td>
                    <td>${fm.total}</td>
                    <td style="color:${fm.cancelados>0?'#ff5252':'#9aa0b4'}">${fm.cancelados}</td>
                    <td style="color:${pct>50?'#ff5252':pct>20?'#ffb74d':'#4caf84'}">${pct.toFixed(1)}%</td>
                    <td class="bar-cell"><div class="bar-fill-bg"><div class="bar-fill" style="width:${barW}%"></div></div></td>
                </tr>`;
            });
            faixaHTML += '</tbody></table>';
            document.getElementById('faixaTable').innerHTML = faixaHTML;

            // Data Table
            document.getElementById('tableCount').textContent = `(${d.length} registros)`;
            const thead = document.getElementById('dataTable').querySelector('thead');
            const tbody = document.getElementById('dataTable').querySelector('tbody');
            thead.innerHTML = `<tr>
                <th>Data</th><th>Número</th><th>Cessionário</th><th>VGV</th><th>% Entrada</th><th>Entrada Efetiva</th><th>Status</th><th>Closer</th>
            </tr>`;
            const sortedForTable = [...d].sort((a, b) => b.dataObj - a.dataObj).slice(0, 200);
            tbody.innerHTML = sortedForTable.map(r => `<tr>
                <td>${r.data}</td>
                <td>${r.numero}</td>
                <td>${r.cessionario.length > 28 ? r.cessionario.substring(0,28)+'...' : r.cessionario}</td>
                <td>${fmtBRL(r.valorNegociado)}</td>
                <td>${r.percentualEntrada.toFixed(1)}%</td>
                <td>${fmtBRL2(r.entradaEfetiva)}</td>
                <td><span class="badge ${r.status==='ATIVO'?'badge-active':'badge-cancelled'}">${r.status}</span></td>
                <td>${r.closer.length > 22 ? r.closer.substring(0,22)+'...' : r.closer}</td>
            </tr>`).join('');
        }

        renderAll();
    </script>
</body>
</html>
