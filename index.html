<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLINA DREAMS – Dashboard de Vendas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --bg-deep: #040b18;
            --bg-card: rgba(8, 20, 44, 0.75);
            --bg-card-hover: rgba(10, 28, 56, 0.85);
            --border: rgba(0, 149, 255, 0.18);
            --border-glow: rgba(0, 149, 255, 0.35);
            --accent: #0095ff;
            --accent-light: #00c6ff;
            --accent-soft: #4dc9f6;
            --text: #e0e8f0;
            --text-dim: #8899b4;
            --text-bright: #ffffff;
            --danger: #ff4d6a;
            --success: #00e396;
            --warning: #f0a500;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--border);
            --shadow-glow: 0 0 40px rgba(0, 149, 255, 0.12), 0 4px 32px rgba(0, 0, 0, 0.5);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(0, 149, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(0, 198, 255, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 100, 200, 0.03) 0%, transparent 70%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Animated grid background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 149, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 149, 255, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
        }

        .dashboard {
            position: relative;
            z-index: 1;
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px 28px 40px;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 28px;
        }
        .header-left h1 {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            backdrop-filter: blur(16px);
        }
        .header-right label {
            font-size: 0.78rem;
            color: var(--text-dim);
            white-space: nowrap;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .header-right input {
            background: rgba(0, 149, 255, 0.08);
            border: 1px solid var(--border);
            color: var(--text-bright);
            padding: 9px 14px;
            border-radius: 40px;
            font-size: 0.82rem;
            font-family: inherit;
            width: 140px;
            outline: none;
            transition: var(--transition);
            cursor: pointer;
        }
        .header-right input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 149, 255, 0.1);
        }
        .btn-reset {
            background: rgba(0, 149, 255, 0.15);
            border: 1px solid var(--border);
            color: var(--accent-light);
            padding: 9px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-reset:hover {
            background: rgba(0, 149, 255, 0.25);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 149, 255, 0.2);
        }

        /* ── KPI CARDS ROW ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-bottom: 24px;
        }
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            backdrop-filter: blur(16px);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }
        .kpi-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
            transform: translateY(-2px);
        }
        .kpi-card::after {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 149, 255, 0.1) 0%, transparent 70%);
        }
        .kpi-icon {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }
        .kpi-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            font-weight: 600;
        }
        .kpi-value {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            margin-top: 2px;
        }
        .kpi-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .kpi-accent {
            color: var(--accent-light);
        }
        .kpi-danger {
            color: var(--danger);
        }
        .kpi-success {
            color: var(--success);
        }

        /* ── CHART GRID ── */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }
        .chart-grid.three {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .chart-grid.full {
            grid-template-columns: 1fr;
        }
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            backdrop-filter: blur(16px);
            transition: var(--transition);
            position: relative;
        }
        .chart-card:hover {
            border-color: var(--border-glow);
            box-shadow: var(--shadow-glow);
        }
        .chart-card h3 {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 14px;
        }
        .chart-card h3 span {
            color: var(--accent-light);
        }
        .chart-wrap {
            position: relative;
            width: 100%;
            height: 320px;
        }
        .chart-wrap.tall {
            height: 380px;
        }
        .chart-wrap.short {
            height: 280px;
        }
        .chart-wrap.xshort {
            height: 250px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .chart-grid.three {
                grid-template-columns: 1fr 1fr;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .header-right {
                width: 100%;
                flex-wrap: wrap;
                justify-content: flex-end;
            }
            .kpi-row {
                grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            }
        }
        @media (max-width: 700px) {
            .chart-grid.three {
                grid-template-columns: 1fr;
            }
            .dashboard {
                padding: 12px 10px 24px;
            }
            .kpi-value {
                font-size: 1.3rem;
            }
            .header-right input {
                width: 110px;
            }
        }

        /* ── FLATPICKR OVERRIDES ── */
        .flatpickr-calendar {
            background: #0a1830 !important;
            border: 1px solid var(--border-glow) !important;
            border-radius: var(--radius) !important;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6) !important;
        }
        .flatpickr-day {
            color: var(--text) !important;
            border-radius: 8px !important;
        }
        .flatpickr-day.selected,
        .flatpickr-day.startRange,
        .flatpickr-day.endRange {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
        }
        .flatpickr-day.inRange {
            background: rgba(0, 149, 255, 0.2) !important;
            border-color: transparent !important;
            box-shadow: none !important;
        }
        .flatpickr-months .flatpickr-month,
        .flatpickr-current-month,
        .flatpickr-weekday {
            color: var(--text-dim) !important;
        }
        .flatpickr-day.today {
            border-color: var(--accent-light) !important;
        }

        /* animated pulse for live indicator */
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }
        .live-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            margin-right: 6px;
            animation: pulse 1.8s infinite;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- ═══════════ HEADER ═══════════ -->
        <div class="header">
            <div class="header-left">
                <h1>COLLINA DREAMS</h1>
                <div class="subtitle"><span class="live-dot"></span>Bordero de Vendas · Dashboard Interativo</div>
            </div>
            <div class="header-right">
                <label>📅 Período</label>
                <input type="text" id="date-start" placeholder="Data inicial" readonly>
                <span style="color:var(--text-dim)">→</span>
                <input type="text" id="date-end" placeholder="Data final" readonly>
                <button class="btn-reset" id="btn-reset">⟳ Limpar</button>
            </div>
        </div>

        <!-- ═══════════ KPI ROW ═══════════ -->
        <div class="kpi-row" id="kpi-row">
            <div class="kpi-card">
                <div class="kpi-icon">💰</div>
                <div class="kpi-label">VGV Total</div>
                <div class="kpi-value" id="kpi-vgv">R$ 0</div>
                <div class="kpi-sub">Valor geral de vendas</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon">📥</div>
                <div class="kpi-label">Entrada Efetiva</div>
                <div class="kpi-value kpi-accent" id="kpi-entrada">R$ 0</div>
                <div class="kpi-sub">Total recebido na entrada</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon">🛒</div>
                <div class="kpi-label">Qtd. de Vendas</div>
                <div class="kpi-value" id="kpi-qtd">0</div>
                <div class="kpi-sub" id="kpi-ativas">Ativas: 0</div>
            </div>
            <div class="kpi-card">
                <div
